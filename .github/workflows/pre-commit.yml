name: pre-commit

on:
  push:

jobs:
  deptry:
    runs-on: ubuntu-latest
    steps:
      - name: "Build the virtual environment for ${{ github.repository }}"
        uses: cvxgrp/.github/actions/environment/pip@main

      - name: Run deptry
        shell: bash
        run: |
          python -m pip install --no-cache-dir deptry

      - name: Run deptry
        shell: bash
        run: |
          deptry -vv --per-rule-ignores "DEP002=kaleido" pyscribble

  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: cvxgrp/.github/actions/pre-commit@v2.1.1
